<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>找回密码 - 衣橱管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="manifest" href="/static/manifest.webmanifest">
  <meta name="theme-color" content="#0f0f12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="header">
    <nav class="nav">
      <a class="logo" href="/">衣橱管理</a>
      <ul class="nav-links">
        <li><a href="/auth/login">登录</a></li>
        <li><a href="/auth/register">注册</a></li>
      </ul>
    </nav>
  </header>

  <main class="page">
    <section class="section narrow">
      <div class="section-head">
        <h1>找回密码</h1>
      </div>

      <form class="form" method="post" action="/auth/forgot">
        {% if message %}
          <p class="hint">{{ message }}</p>
        {% endif %}

        <div class="field">
          <label>用户名</label>
          <input name="username" required />
          <p class="hint">开发版：提交后会直接显示重置链接（生产环境应通过邮箱/短信发送）。</p>
        </div>

        <div class="actions">
          <button class="btn" type="submit">生成重置方式</button>
        </div>

        {% if reset_link %}
          <div class="divider"></div>
          <p class="muted">重置链接（开发版）：</p>
          <p><a class="link" href="{{ reset_link }}">{{ reset_link }}</a></p>
        {% endif %}
      </form>
    </section>
  </main>
</body>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js').catch(() => {});
  }
</script>
</html>
